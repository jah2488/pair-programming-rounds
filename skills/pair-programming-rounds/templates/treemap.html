<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TITLE_PLACEHOLDER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tufte-css/1.8.0/tufte.min.css" />
    <style>
        body { background: #fffff8; }
        svg text { font-family: et-book, Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif; }
        .cell rect { stroke: #fffff8; stroke-width: 2px; cursor: pointer; }
        .cell text { font-size: 0.65rem; fill: #333; pointer-events: none; }
        .cell text.small { font-size: 0.55rem; fill: #666; }
        .cell:hover rect { stroke: #333; stroke-width: 2px; }
        .breadcrumb { font-size: 0.85rem; margin: 0.5rem 0; color: #666; cursor: pointer; }
        .breadcrumb span { color: #333; }
        .breadcrumb a { color: #4e79a7; text-decoration: none; cursor: pointer; }
        .breadcrumb a:hover { text-decoration: underline; }
        .tooltip { position: fixed; background: #fffff8; border: 1px solid #e0e0e0; padding: 0.5rem 0.75rem;
            font-size: 0.8rem; font-family: et-book, Palatino, Georgia, serif; pointer-events: none;
            opacity: 0; transition: opacity 0.15s; max-width: 280px; z-index: 10; }
        .tooltip.visible { opacity: 1; }
        .metric-toggle { margin: 0.5rem 0; font-size: 0.8rem; }
        .metric-toggle button { font-family: et-book, Palatino, Georgia, serif; font-size: 0.8rem;
            background: none; border: 1px solid #e0e0e0; padding: 0.25rem 0.75rem; cursor: pointer;
            margin-right: 0.5rem; color: #666; }
        .metric-toggle button.active { border-color: #333; color: #333; }
        #viz { width: 100%; min-height: 500px; }
        table.data-table { width: 100%; border-collapse: collapse; margin-top: 2rem; font-size: 0.85rem; }
        table.data-table th { text-align: left; border-bottom: 2px solid #333; padding: 0.3rem 0.5rem; }
        table.data-table td { border-bottom: 1px solid #e0e0e0; padding: 0.3rem 0.5rem; }
        table.data-table td.num { text-align: right; }
    </style>
</head>
<body>
    <article>
        <h1>TITLE_PLACEHOLDER</h1>
        <p class="subtitle">SUBTITLE_PLACEHOLDER</p>

        <section>
            <figure>
                <div class="breadcrumb" id="breadcrumb"><span>root</span></div>
                <div class="metric-toggle" id="metric-toggle"></div>
                <div id="viz"></div>
                <figcaption>CAPTION_PLACEHOLDER</figcaption>
            </figure>
        </section>

        <section>
            <p>PROVENANCE_PLACEHOLDER</p>
        </section>

        <section>
            <h2>Data Table</h2>
            <table class="data-table" id="data-table"></table>
        </section>
    </article>

    <div class="tooltip" id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <script>
        // DATA FORMAT:
        // {
        //   metrics: ["complexity", "coverage", "churn"],
        //   default_metric: "complexity",
        //   root: {
        //     name: "src",
        //     children: [
        //       {
        //         name: "auth",
        //         children: [
        //           { name: "login.ts", size: 340, complexity: 12, coverage: 0.85, churn: 15 },
        //           { name: "session.ts", size: 120, complexity: 4, coverage: 0.92, churn: 3 }
        //         ]
        //       },
        //       { name: "utils.ts", size: 80, complexity: 2, coverage: 1.0, churn: 1 }
        //     ]
        //   }
        // }
        const DATA = {};

        const container = document.getElementById("viz");
        const tooltip = document.getElementById("tooltip");
        const width = container.clientWidth || 800;
        const height = Math.max(500, width * 0.6);

        let currentMetric = DATA.default_metric || DATA.metrics[0];
        let currentRoot = DATA.root;
        let breadcrumbPath = [DATA.root];

        // Color scales per metric (single-hue sequential — colorblind safe)
        const colorScales = {};
        const allLeaves = [];
        function collectLeaves(node) {
            if (!node.children) { allLeaves.push(node); return; }
            node.children.forEach(collectLeaves);
        }
        collectLeaves(DATA.root);

        DATA.metrics.forEach(m => {
            const extent = d3.extent(allLeaves, d => d[m] ?? 0);
            colorScales[m] = d3.scaleSequential(d3.interpolateBlues).domain([extent[0] || 0, extent[1] || 1]);
        });

        // Metric toggle buttons
        const toggleContainer = document.getElementById("metric-toggle");
        DATA.metrics.forEach(m => {
            const btn = document.createElement("button");
            btn.textContent = m;
            btn.className = m === currentMetric ? "active" : "";
            btn.addEventListener("click", () => {
                currentMetric = m;
                toggleContainer.querySelectorAll("button").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                render(currentRoot);
            });
            toggleContainer.appendChild(btn);
        });

        const svg = d3.select("#viz").append("svg")
            .attr("width", width).attr("height", height)
            .attr("viewBox", [0, 0, width, height]);

        function render(rootData) {
            svg.selectAll("*").remove();

            const hierarchy = d3.hierarchy(rootData)
                .sum(d => d.size || 0)
                .sort((a, b) => b.value - a.value);

            d3.treemap()
                .size([width, height])
                .padding(2)
                .round(true)(hierarchy);

            const cells = svg.selectAll("g")
                .data(hierarchy.leaves()).join("g")
                .attr("class", "cell")
                .attr("transform", d => `translate(${d.x0},${d.y0})`);

            cells.append("rect")
                .attr("width", d => d.x1 - d.x0)
                .attr("height", d => d.y1 - d.y0)
                .attr("fill", d => {
                    const val = d.data[currentMetric];
                    return val != null ? colorScales[currentMetric](val) : "#e0e0e0";
                });

            // Labels only on cells large enough
            cells.filter(d => (d.x1 - d.x0) > 50 && (d.y1 - d.y0) > 20)
                .append("text")
                .attr("x", 4).attr("y", 14)
                .text(d => d.data.name);

            cells.filter(d => (d.x1 - d.x0) > 60 && (d.y1 - d.y0) > 34)
                .append("text")
                .attr("class", "small")
                .attr("x", 4).attr("y", 26)
                .text(d => `${d.data.size} LOC`);

            // Click to drill down
            cells.filter(d => d.data.children && d.data.children.length > 0)
                .style("cursor", "pointer")
                .on("click", (event, d) => {
                    breadcrumbPath.push(d.data);
                    currentRoot = d.data;
                    updateBreadcrumb();
                    render(currentRoot);
                });

            // Tooltip
            cells.on("mouseover", (event, d) => {
                let html = `<strong>${d.data.name}</strong><br>${d.data.size || 0} LOC`;
                DATA.metrics.forEach(m => {
                    if (d.data[m] != null) html += `<br><strong>${m}:</strong> ${typeof d.data[m] === "number" && d.data[m] < 1 ? (d.data[m] * 100).toFixed(0) + "%" : d.data[m]}`;
                });
                tooltip.innerHTML = html;
                tooltip.classList.add("visible");
            }).on("mousemove", (event) => {
                tooltip.style.left = (event.clientX + 16) + "px";
                tooltip.style.top = (event.clientY - 10) + "px";
            }).on("mouseout", () => {
                tooltip.classList.remove("visible");
            });
        }

        function updateBreadcrumb() {
            const bc = document.getElementById("breadcrumb");
            bc.innerHTML = "";
            breadcrumbPath.forEach((node, i) => {
                if (i > 0) { const sep = document.createTextNode(" / "); bc.appendChild(sep); }
                if (i < breadcrumbPath.length - 1) {
                    const a = document.createElement("a");
                    a.textContent = node.name;
                    a.addEventListener("click", () => {
                        breadcrumbPath = breadcrumbPath.slice(0, i + 1);
                        currentRoot = node;
                        updateBreadcrumb();
                        render(currentRoot);
                    });
                    bc.appendChild(a);
                } else {
                    const span = document.createElement("span");
                    span.textContent = node.name;
                    bc.appendChild(span);
                }
            });
        }

        render(currentRoot);
        updateBreadcrumb();

        // Data table
        const table = document.getElementById("data-table");
        let tableHtml = `<thead><tr><th>File</th><th class="num">LOC</th>`;
        DATA.metrics.forEach(m => { tableHtml += `<th class="num">${m}</th>`; });
        tableHtml += "</tr></thead><tbody>";
        allLeaves.sort((a, b) => (b.size || 0) - (a.size || 0)).forEach(leaf => {
            tableHtml += `<tr><td>${leaf.name}</td><td class="num">${leaf.size || 0}</td>`;
            DATA.metrics.forEach(m => {
                const v = leaf[m];
                tableHtml += `<td class="num">${v != null ? (typeof v === "number" && v < 1 ? (v * 100).toFixed(0) + "%" : v) : "—"}</td>`;
            });
            tableHtml += "</tr>";
        });
        tableHtml += "</tbody>";
        table.innerHTML = tableHtml;
    </script>
</body>
</html>
